<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #f5efff 0%, #f1e6ff 100%);
            color: #230036;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }

        .page-wrapper {
            width: min(100%, 420px);
        }

        h1 {
            margin: 0 0 1rem;
            font-size: clamp(2rem, 4vw, 2.8rem);
            text-align: center;
            letter-spacing: 0.02em;
        }

        .app {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(138, 43, 226, 0.16);
            box-shadow: 0 26px 55px rgba(82, 0, 119, 0.14);
            overflow: hidden;
        }

        .app-header {
            padding: 1.2rem 1rem;
            background: #8d17d9;
            color: white;
            text-align: center;
            font-size: clamp(1.4rem, 3vw, 1.9rem);
            font-weight: 700;
        }

        .app-body {
            padding: 1.5rem 1.25rem 1.75rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .counter-display {
            width: min(240px, 70vw);
            min-height: 150px;
            border-radius: 999px;
            background: #f4d9ff;
            display: grid;
            place-items: center;
            padding: 1.2rem;
            box-shadow: inset 0 0 0 1px rgba(135, 0, 169, 0.08);
        }

        .counter-display p {
            margin: 0;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            color: #170008;
        }

        .counter-label {
            margin: 0;
            font-size: clamp(1.15rem, 3vw, 1.7rem);
            font-weight: 800;
            text-align: center;
            color: #220034;
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.85rem;
            width: 100%;
            margin-top: 0.25rem;
        }

        .button-row button {
            flex: 1 1 120px;
            min-width: 110px;
            padding: 0.95rem 1rem;
            border: none;
            border-radius: 14px;
            background: #7b00d2;
            color: white;
            font-size: clamp(0.95rem, 2.5vw, 1rem);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 18px rgba(124, 27, 196, 0.18);
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
        }

        .button-row button:hover {
            transform: translateY(-2px);
            background: #6500aa;
            box-shadow: 0 14px 22px rgba(101, 0, 170, 0.22);
        }

        .footer-banner {
            background: #6e00a4;
            color: white;
            padding: 1rem 1.25rem;
            border-radius: 0 0 20px 20px;
            text-align: center;
            font-weight: 700;
            font-size: clamp(1.05rem, 3vw, 1.4rem);
        }

        .footer-banner span {
            margin-right: 0.35rem;
        }

        @media (max-width: 380px) {
            body {
                padding: 1.2rem 0.75rem 1.5rem;
            }

            .app-body {
                padding: 1.25rem 1rem 1.4rem;
            }

            .button-row {
                gap: 0.55rem;
            }

            .button-row button {
                flex: 1 1 100%;
                min-width: 0;
            }
        }
    </style>
    <div class="page-wrapper">
        <h1>Counter App</h1>
        <div class="app">
            <div class="app-header">Simple Counter</div>
            <div class="app-body">
                <div class="counter-display"><p id="count-display">0</p></div>
                <p class="counter-label">Your Count</p>
                <div class="button-row">
                    <button id="button1" type="button">✚ Increase</button>
                    <button id="button2" type="button">▬ Decrease</button>
                    <button id="button3" type="button">⟳ Reset</button>
                </div>
            </div>
            <div class="footer-banner"><span>✨</span>Small Step Big progress!</div>
        </div>
    </div>
    
</body>
<script>
    const display = document.getElementById("count-display");
    const increase = document.getElementById("button1");
    const decrease = document.getElementById("button2");
    const reset = document.getElementById("button3");
    let count = 0;
    
    function updateDisplay() {
        display.textContent = count;
    }
    
    increase.addEventListener("click", function() {
        count++;
        updateDisplay();
    });
    decrease.addEventListener("click", function() {
        count--;
        updateDisplay();
    });
    reset.addEventListener("click", function() {
        count = 0;
        updateDisplay();
    });
    
</script>
</html>
